<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>REVIEW BOARD</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191d22;
      --panel-2: #212730;
      --line: #343d49;
      --text: #f4f7fb;
      --muted: #aeb8c5;
      --accent: #ff7a1a;
      --blue: #2f80ed;
      --red: #eb5757;
      --green: #27ae60;
      --yellow: #f2c94c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, textarea { font: inherit; }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      min-height: 48px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { border-color: var(--accent); }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #111;
    }

    button.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }

    main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .tag {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .section {
      border-top: 1px solid var(--line);
      padding: 16px 0;
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .file {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #14181d;
    }

    .file input {
      display: block;
      max-width: 100%;
      margin-top: 8px;
      color: var(--muted);
    }

    .url-load {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .url-load input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11151a;
      color: var(--text);
      padding: 0 10px;
    }

    .video-box {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #050607;
    }

    video {
      display: block;
      width: 100%;
      max-height: 230px;
      background: #050607;
    }

    .timebar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tool-grid button { padding: 0 8px; }

    .note-box {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11151a;
      color: var(--text);
      padding: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
      background: #111418;
    }

    .status {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board-wrap {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .board {
      position: relative;
      width: min(100%, 1120px);
      aspect-ratio: 16 / 9;
      min-height: 360px;
      margin: 0 auto;
      border: 2px solid #f2f5f8;
      background:
        linear-gradient(rgba(20, 28, 24, .36), rgba(20, 28, 24, .36)),
        repeating-linear-gradient(90deg, #237044 0 10%, #1e653e 10% 20%);
      overflow: hidden;
      touch-action: none;
    }

    .board.has-frame {
      background-size: cover;
      background-position: center;
    }

    .board::before {
      content: "";
      position: absolute;
      inset: 8%;
      border: 2px solid rgba(255, 255, 255, .72);
      pointer-events: none;
      z-index: 2;
    }

    .board::after {
      content: "";
      position: absolute;
      top: 8%;
      bottom: 8%;
      left: 50%;
      border-left: 2px solid rgba(255, 255, 255, .72);
      pointer-events: none;
      z-index: 2;
    }

    .board-video {
      position: absolute;
      inset: 0;
      display: none;
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    .board.video-live {
      background-image: none !important;
    }

    .board.video-live .board-video {
      display: block;
    }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 19%;
      height: 33.8%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, .72);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .goal {
      position: absolute;
      top: 39%;
      width: 6%;
      height: 22%;
      border: 2px solid rgba(255, 255, 255, .72);
      pointer-events: none;
      z-index: 2;
    }

    .goal.left {
      left: 8%;
      border-left: 0;
    }

    .goal.right {
      right: 8%;
      border-right: 0;
    }

    .piece {
      position: absolute;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 2px solid rgba(255, 255, 255, .95);
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .55);
      transform: translate(-50%, -50%);
      user-select: none;
      cursor: grab;
      z-index: 10;
    }

    .piece:active { cursor: grabbing; }
    .piece.home { background: var(--blue); }
    .piece.away { background: var(--red); }

    .piece.ball {
      width: 30px;
      height: 30px;
      background: #f7f7f2;
      color: #111;
      font-size: 15px;
      text-shadow: none;
    }

    .piece.selected { box-shadow: 0 0 0 4px rgba(255, 122, 26, .5); }

    .arrow {
      position: absolute;
      height: 4px;
      border-radius: 999px;
      background: var(--yellow);
      transform-origin: 0 50%;
      z-index: 8;
      pointer-events: auto;
      cursor: pointer;
    }

    .arrow.dribble {
      background: repeating-linear-gradient(90deg, var(--green) 0 12px, transparent 12px 20px);
      height: 6px;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 50%;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 14px solid var(--yellow);
      transform: translateY(-50%);
    }

    .arrow.dribble::after { border-left-color: var(--green); }

    .label {
      position: absolute;
      min-width: 120px;
      max-width: 240px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, .4);
      border-radius: 8px;
      background: rgba(0, 0, 0, .68);
      color: #fff;
      font-size: 14px;
      line-height: 1.35;
      transform: translate(-50%, -50%);
      z-index: 12;
      cursor: move;
      user-select: none;
      white-space: pre-wrap;
    }

    .label.selected {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin: 0;
    }

    @media (hover: none) and (pointer: coarse) {
      button { min-height: 54px; }

      .piece {
        width: 48px;
        height: 48px;
        font-size: 15px;
      }

      .piece.ball {
        width: 36px;
        height: 36px;
      }

      .label {
        min-width: 150px;
        font-size: 16px;
      }
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }

      aside {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand, .video-box, .hint { display: none; }

      .section {
        border-top: 0;
        padding: 0;
      }

      .board-wrap { padding: 10px; }

      .board {
        width: min(100%, 980px);
        min-height: 420px;
      }
    }

    @media (max-width: 720px) {
      aside { grid-template-columns: 1fr; }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>REVIEW BOARD</h1>
        <span class="tag">v0.2</span>
      </div>

      <div class="section">
        <div class="section-title">Video</div>
        <div class="stack">
          <label class="file">
            動画を選択
            <input id="videoInput" type="file" accept="video/*">
          </label>
          <div class="url-load">
            <input id="videoUrl" type="url" inputmode="url" placeholder="動画URL / PULSE ECHOの直リンク">
            <button id="loadUrl" type="button">読込</button>
          </div>
          <div class="video-box">
            <video id="video" controls playsinline></video>
          </div>
          <div class="timebar">
            <button id="backFrame" type="button">-1F</button>
            <input id="seek" type="range" min="0" max="1000" value="0">
            <button id="forwardFrame" type="button">+1F</button>
          </div>
          <div class="row">
            <button id="captureFrame" class="primary" type="button">この場面を背景にする</button>
            <button id="clearFrame" type="button">動画に戻す</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Review</div>
        <div class="stack">
          <div class="tool-grid">
            <button id="addHome" type="button">味方</button>
            <button id="addAway" type="button">相手</button>
            <button id="addBall" type="button">ボール</button>
            <button id="arrowTool" type="button">パス矢印</button>
            <button id="dribbleTool" type="button">ドリブル</button>
            <button id="addLabel" type="button">メモ</button>
            <button id="deleteSelected" type="button">削除</button>
          </div>
          <textarea id="noteText" class="note-box" placeholder="ここはこうして欲しい / 寄せる / 受け渡し"></textarea>
          <div class="row">
            <button id="resetPieces" type="button">初期配置</button>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="hint">動画を確認したい場面で止めて静止画化し、その上に選手・ボール・矢印・メモを置けます。「動画に戻す」で配置を残したまま再生に戻ります。</p>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div id="status" class="status">動画を読み込むか、そのままレビュー用ボードとして使えます。</div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board" aria-label="review board">
          <video id="boardVideo" class="board-video" muted playsinline></video>
          <div class="center-circle"></div>
          <div class="goal left"></div>
          <div class="goal right"></div>
        </div>
      </div>
    </main>
  </div>

  <canvas id="frameCanvas" hidden></canvas>

  <script>
    const board = document.getElementById("board");
    const video = document.getElementById("video");
    const boardVideo = document.getElementById("boardVideo");
    const videoInput = document.getElementById("videoInput");
    const videoUrl = document.getElementById("videoUrl");
    const seek = document.getElementById("seek");
    const status = document.getElementById("status");
    const noteText = document.getElementById("noteText");
    const frameCanvas = document.getElementById("frameCanvas");

    const state = {
      selected: null,
      drag: null,
      arrowMode: false,
      arrowType: "pass",
      arrowDraft: null,
      pieceCounts: { home: 0, away: 0, ball: 0 },
      frameDataUrl: ""
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function setStatus(message) {
      status.textContent = message;
    }

    function sizeBoardForOlderTablet() {
      if (window.CSS && CSS.supports && CSS.supports("aspect-ratio", "16 / 9")) return;
      const width = board.clientWidth;
      if (!width) return;
      board.style.height = `${Math.round(width * 9 / 16)}px`;
    }

    function boardPoint(event) {
      const rect = board.getBoundingClientRect();
      return {
        x: clamp(event.clientX - rect.left, 0, rect.width),
        y: clamp(event.clientY - rect.top, 0, rect.height),
        rect
      };
    }

    function percentFromBoardPoint(point) {
      return {
        x: point.x / point.rect.width * 100,
        y: point.y / point.rect.height * 100
      };
    }

    function setSelected(element) {
      if (state.selected) state.selected.classList.remove("selected");
      state.selected = element;
      if (state.selected) state.selected.classList.add("selected");
    }

    function placePercent(element) {
      element.style.left = `${element.dataset.x}%`;
      element.style.top = `${element.dataset.y}%`;
    }

    function createPiece(type, x = 50, y = 50) {
      state.pieceCounts[type] += 1;
      const piece = document.createElement("div");
      piece.className = `piece ${type}`;
      piece.dataset.kind = "piece";
      piece.dataset.type = type;
      piece.dataset.x = x;
      piece.dataset.y = y;
      piece.textContent = type === "ball" ? "●" : state.pieceCounts[type];
      board.appendChild(piece);
      placePercent(piece);
      return piece;
    }

    function createLabel(text, x = 50, y = 50) {
      const label = document.createElement("div");
      label.className = "label";
      label.dataset.kind = "label";
      label.dataset.x = x;
      label.dataset.y = y;
      label.textContent = text || "ここはこうして欲しい";
      board.appendChild(label);
      placePercent(label);
      return label;
    }

    function placeArrow(arrow) {
      const width = board.clientWidth;
      const height = board.clientHeight;
      const x1 = Number(arrow.dataset.x1) / 100 * width;
      const y1 = Number(arrow.dataset.y1) / 100 * height;
      const x2 = Number(arrow.dataset.x2) / 100 * width;
      const y2 = Number(arrow.dataset.y2) / 100 * height;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      arrow.style.left = `${x1}px`;
      arrow.style.top = `${y1}px`;
      arrow.style.width = `${Math.max(18, length)}px`;
      arrow.style.transform = `rotate(${angle}deg)`;
    }

    function createArrow(x1, y1, x2, y2) {
      const arrow = document.createElement("div");
      arrow.className = `arrow ${state.arrowType === "dribble" ? "dribble" : "pass"}`;
      arrow.dataset.kind = "arrow";
      arrow.dataset.type = state.arrowType;
      arrow.dataset.x1 = x1;
      arrow.dataset.y1 = y1;
      arrow.dataset.x2 = x2;
      arrow.dataset.y2 = y2;
      board.appendChild(arrow);
      placeArrow(arrow);
      return arrow;
    }

    function resetPieces() {
      board.querySelectorAll(".piece,.label,.arrow").forEach((item) => item.remove());
      state.pieceCounts = { home: 0, away: 0, ball: 0 };
      setSelected(null);
      [[28, 28], [38, 42], [38, 58], [54, 34], [54, 64]].forEach(([x, y]) => createPiece("home", x, y));
      [[72, 28], [62, 42], [62, 58], [48, 36], [48, 64]].forEach(([x, y]) => createPiece("away", x, y));
      createPiece("ball", 50, 50);
      setStatus("初期配置を作りました。");
    }

    function setVideoSource(src, label) {
      video.src = src;
      boardVideo.src = src;
      boardVideo.muted = true;
      video.load();
      boardVideo.load();
      board.classList.add("video-live");
      board.classList.remove("has-frame");
      setStatus(label || "動画を読み込みました。");
    }

    function captureFrame() {
      if (!video.videoWidth || !video.videoHeight) {
        setStatus("先に動画を読み込んでください。");
        return;
      }
      const canvas = frameCanvas;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      state.frameDataUrl = canvas.toDataURL("image/png");
      board.classList.remove("video-live");
      board.style.backgroundImage = `url("${state.frameDataUrl}")`;
      board.style.backgroundSize = "cover";
      board.style.backgroundPosition = "center";
      board.classList.add("has-frame");
      setStatus(`背景にしました: ${formatTime(video.currentTime)}`);
    }

    function clearFrame() {
      state.frameDataUrl = "";
      board.style.backgroundImage = "";
      board.classList.remove("has-frame");
      board.classList.add("video-live");
      if (video.src) {
        boardVideo.currentTime = video.currentTime || 0;
        if (!video.paused) boardVideo.play().catch(() => {});
        setStatus("動画背景に戻しました。");
      } else {
        setStatus("静止画背景を外しました。");
      }
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds)) return "0:00.0";
      const min = Math.floor(seconds / 60);
      const sec = seconds - min * 60;
      return `${min}:${sec.toFixed(1).padStart(4, "0")}`;
    }

    function syncSeek() {
      if (!video.duration) return;
      seek.value = String(Math.round(video.currentTime / video.duration * 1000));
    }

    function stepFrame(direction) {
      if (!video.duration) return;
      video.pause();
      video.currentTime = clamp(video.currentTime + direction / 30, 0, video.duration);
    }

    function setArrowTool(type, button) {
      const shouldTurnOn = !state.arrowMode || state.arrowType !== type;
      state.arrowType = type;
      state.arrowMode = shouldTurnOn;
      document.getElementById("arrowTool").classList.remove("active");
      document.getElementById("dribbleTool").classList.remove("active");
      button.classList.toggle("active", state.arrowMode);
      const name = type === "dribble" ? "ドリブル" : "パス矢印";
      setStatus(state.arrowMode ? `${name}: ボード上でドラッグしてください。` : "矢印モードを終了しました。");
    }

    videoInput.addEventListener("change", () => {
      const file = videoInput.files && videoInput.files[0];
      if (!file) return;
      setVideoSource(URL.createObjectURL(file), file.name);
    });

    document.getElementById("loadUrl").addEventListener("click", () => {
      const url = videoUrl.value.trim();
      if (!url) {
        setStatus("動画URLを入力してください。");
        return;
      }
      if (/youtube\.com|youtu\.be/.test(url)) {
        setStatus("YouTubeは直接フレーム化できません。MP4/MOVの直リンクなら読み込めます。");
        return;
      }
      setVideoSource(url, "URL動画を読み込みました。");
    });

    video.addEventListener("timeupdate", () => {
      syncSeek();
      if (board.classList.contains("video-live") && Math.abs(boardVideo.currentTime - video.currentTime) > .25) {
        boardVideo.currentTime = video.currentTime;
      }
    });
    video.addEventListener("play", () => {
      if (board.classList.contains("video-live")) boardVideo.play().catch(() => {});
    });
    video.addEventListener("pause", () => boardVideo.pause());
    video.addEventListener("seeking", () => {
      if (boardVideo.readyState) boardVideo.currentTime = video.currentTime;
    });
    video.addEventListener("loadedmetadata", () => {
      syncSeek();
      setStatus(`動画読み込み完了: ${formatTime(video.duration)}`);
    });

    seek.addEventListener("input", () => {
      if (!video.duration) return;
      video.currentTime = Number(seek.value) / 1000 * video.duration;
    });

    document.getElementById("backFrame").addEventListener("click", () => stepFrame(-1));
    document.getElementById("forwardFrame").addEventListener("click", () => stepFrame(1));
    document.getElementById("captureFrame").addEventListener("click", captureFrame);
    document.getElementById("clearFrame").addEventListener("click", clearFrame);
    document.getElementById("addHome").addEventListener("click", () => setSelected(createPiece("home", 50, 50)));
    document.getElementById("addAway").addEventListener("click", () => setSelected(createPiece("away", 50, 50)));
    document.getElementById("addBall").addEventListener("click", () => setSelected(createPiece("ball", 50, 50)));
    document.getElementById("addLabel").addEventListener("click", () => setSelected(createLabel(noteText.value.trim(), 50, 50)));
    document.getElementById("resetPieces").addEventListener("click", resetPieces);
    document.getElementById("arrowTool").addEventListener("click", (event) => setArrowTool("pass", event.currentTarget));
    document.getElementById("dribbleTool").addEventListener("click", (event) => setArrowTool("dribble", event.currentTarget));

    document.getElementById("deleteSelected").addEventListener("click", () => {
      if (!state.selected) return;
      state.selected.remove();
      state.selected = null;
      setStatus("選択中の要素を削除しました。");
    });

    board.addEventListener("pointerdown", (event) => {
      const target = event.target.closest(".piece,.label,.arrow");
      const point = boardPoint(event);
      const percent = percentFromBoardPoint(point);

      if (state.arrowMode && !target) {
        const arrow = createArrow(percent.x, percent.y, percent.x, percent.y);
        state.arrowDraft = arrow;
        setSelected(arrow);
        board.setPointerCapture(event.pointerId);
        return;
      }

      if (!target || target.classList.contains("arrow")) {
        setSelected(target || null);
        return;
      }

      setSelected(target);
      state.drag = { element: target, pointerId: event.pointerId };
      board.setPointerCapture(event.pointerId);
    });

    board.addEventListener("pointermove", (event) => {
      const point = boardPoint(event);
      const percent = percentFromBoardPoint(point);

      if (state.arrowDraft) {
        state.arrowDraft.dataset.x2 = percent.x;
        state.arrowDraft.dataset.y2 = percent.y;
        placeArrow(state.arrowDraft);
        return;
      }

      if (!state.drag) return;
      state.drag.element.dataset.x = percent.x;
      state.drag.element.dataset.y = percent.y;
      placePercent(state.drag.element);
    });

    board.addEventListener("pointerup", (event) => {
      if (state.arrowDraft) {
        const length = state.arrowDraft.offsetWidth;
        if (length < 24) state.arrowDraft.remove();
        state.arrowDraft = null;
      }
      if (state.drag) {
        board.releasePointerCapture(event.pointerId);
        state.drag = null;
      }
    });

    board.addEventListener("dblclick", (event) => {
      const label = event.target.closest(".label");
      if (!label) return;
      const next = prompt("メモを編集", label.textContent);
      if (next !== null) label.textContent = next.trim() || label.textContent;
    });

    window.addEventListener("resize", () => {
      sizeBoardForOlderTablet();
      board.querySelectorAll(".arrow").forEach(placeArrow);
    });

    resetPieces();
    sizeBoardForOlderTablet();
  </script>
</body>
</html>
